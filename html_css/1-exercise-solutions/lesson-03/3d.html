<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <style>
      .bootstrap-btn {
        background-color: rgb(121, 82, 179);
        color: white;
        font-weight: bold;
        border: none;
        height: 40px;
        width: 120px;
        border-radius: 3px;
        cursor: pointer;
        margin-right: 10px;
        transition: background-color 0.15s;
      }
      .bootstrap-btn:hover {
        background-color: rgb(95, 33, 188);
      }
      .download-btn {
        background-color: white;
        color: rgb(108, 117, 125);
        height: 40px;
        width: 100px;
        font-weight: bold;
        border-color: rgb(108, 117, 125);
        border-style: solid;
        border-radius: 4px;
        border-width: 1px;
        cursor: pointer;
        transition:
          background-color 0.15s,
          color 0.15s;
      }
      .download-btn:hover {
        background-color: rgb(79, 82, 84);
        color: white;
      }
    </style>
  </head>
  <body>
    <button class="bootstrap-btn">Get started</button>
    <button class="download-btn">Download</button>
  </body>
</html>
