<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <style>
        .linkedln-btn{
            background-color:rgb(10,102,194);
            color: white;
            font-weight: bold;
            border: none;
            height: 40px;
            width: 220px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        .save-btn{
            background-color: white;
            color: rgb(10,102,194);
            height: 40px;
            width: 80px;
            font-weight: bold;
            border-color: rgb(10,102,194);
            border-style: solid;
            border-radius: 20px;
            border-width: 1px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="linkedln-btn">
        Apply on company website
    </button>
    <button class="save-btn">
        Save
    </button>
</body>
</html>
