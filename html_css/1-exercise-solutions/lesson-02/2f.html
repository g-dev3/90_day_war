<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style>
        .amazon-link{
            color: rgb(0,113,133);
        }
        .item-name{
            font-weight: bold;
        }
        .stock-p{
            color: rgb(0, 118, 0);
            font-weight: bold;
        }
        .amazon-btn{
            background-color:rgb(255,216,20);
            border: none;
            height: 40px;
            width: 170px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        .buy-btn{
            background-color:rgb(255,164,28);
            border: none;
            height: 40px;
            width: 130px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="https://amazon.com" target="_blank" class="amazon-link">Back to Amazon</a>
    <p class="item-name">Nike Black Running Shoes</p>
    <p class="stock-p">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
    <button class="amazon-btn">Add to Cart</button>
    <button class="buy-btn">Buy Now</button>
</body>
</html>
