<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <style>
      .amazon-btn {
        background-color: rgb(255, 216, 20);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 30px;
        padding-left: 30px;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.15s;
      }
      .amazon-btn:hover {
        background-color: rgb(226, 189, 0);
      }
    </style>
  </head>
  <body>
    <button class="amazon-btn">Add to Cart</button>
  </body>
</html>
