<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uber Button</title>
    <style>
      .uber-btn {
        background-color: black;
        color: white;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .uber-btn:hover {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <button class="uber-btn">Request now</button>
  </body>
</html>
