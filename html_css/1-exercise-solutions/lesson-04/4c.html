<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <style>
      .github-btn {
        background-color: rgb(46, 164, 79);
        color: white;
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 15px;
        padding-left: 15px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: box-shadow 0.15s;
      }
      .github-btn:hover {
        box-shadow: 0px 5px 8px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <button class="github-btn">Sign up</button>
  </body>
</html>
