<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>practice</title>
    <style>
      button {
        background-color: green;
        color: white;
        font-size: 18px;
        border: none;
        padding-right: 12px;
        padding-left: 12px;
        padding-top: 8px;
        padding-bottom: 8px;
        cursor: pointer;
        /* transition: box-shadow 1s; */
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3);
      }
      button:active {
        margin-top: 4px;
        margin-left: 4px;
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <button>Shadow</button>
  </body>
</html>
