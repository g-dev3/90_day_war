<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>practice</title>
    <style>
      button {
        background-color: green;
        color: white;
        font-size: 18px;
        border: none;
        padding-right: 15px;
        padding-left: 15px;
        padding-top: 5px;
        padding-bottom: 5px;
        margin-right: 10px;
        margin-left: 10px;
        cursor: pointer;
        transition:
          padding 0.15s,
          margin 0.15s;
      }
      button:hover {
        padding-right: 25px;
        padding-left: 25px;
        margin-left: 0px;
        margin-right: 0px;
      }
    </style>
  </head>
  <body>
    <button class="btn-one">One</button>
    <button class="btn-two">Two</button>
    <button class="btn-three">Three</button>
  </body>
</html>
