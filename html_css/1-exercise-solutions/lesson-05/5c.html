<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <style>
      p {
        font-family: verdana;
        margin-bottom: 0;
        margin-top: 0;
        width: 260px;
      }
      .title{
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 5px;
      }
      .notice{
        color: gray;
        font-size: 16px;
        margin-bottom: 20px;
      }
      .desc{
        line-height: 18px;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .btn{
        font-family: verdana;
        border: none;
        background-color: green;
        color: white;
        padding-top: 12px;
        padding-bottom: 12px;
        padding-right: 20px;
        padding-left: 20px;
        border-radius: 5px;
        cursor: pointer;
      }
      
    </style>
  </head>
  <body>
    <p class="title">HTML CSS Course</p>
    <p class="notice">Beginner to Pro</p>
    <p class="desc">In this course, we'll learn the skills you need to become a developer.</p>
    <button class="btn">Get Started</button>
  </body>
</html>
