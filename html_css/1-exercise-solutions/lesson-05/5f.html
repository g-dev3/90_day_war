<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>practice</title>
    <style>
        p{
            font-family: Arial;
            margin-top: 0;
            margin-bottom: 0;
        }
        .price{
            font-size: 18px;
            margin-bottom: 5px;
        }
        .currency{
            font-size: 12px;
            color: gray;
        }
        .today-price{
            font-size: 10px;
            color: green;
            margin-bottom: 5px;
        }
        .price-hourly{
            color: gray;
            font-size: 10px;
        }
        .network{
            color: red;
        }
    </style>
  </head>
  <body>
    <p class="price">1,049.61 <span class="currency">USD</span></p>
    <p class="today-price">+18.05(1.75%) today</p>
    <p class="price-hourly">After hours 1,048.00 <span class="network">-1.60 (0.15%)</span></p>
  </body>
</html>
