<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <style>
      p {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
        text-align: center;
        width: 200px;
      }
      .item {
        font-size: 6px;
        color: rgb(255, 149, 11);
      }
      .item-name {
        font-weight: bold;
        font-size: 12px;
      }
      .specific {
        font-size: 18px;
        font-weight: bold;
      }
      .price {
        font-size: 10px;
        line-height: 19px;
      }
      .buy-btn {
        border: none;
        background-color: rgb(31, 84, 230);
        color: white;
        font-size: 7px;
        border-radius: 10px;
        padding-top: 3px;
        padding-bottom: 3px;
        padding-right: 8px;
        padding-left: 8px;
        margin-left: 90px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p class="item">New</p>
    <p class="item-name">MacBook Pro</p>
    <p class="specific">Supercharged for pros.</p>
    <p class="price">From &#36;1999</p>
    <button class="buy-btn">Buy</button>
  </body>
</html>
